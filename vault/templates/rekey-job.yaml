{{- if and .Values.recovery.rekey.enabled (not .Values.recovery.rekey.confirm) }}
{{- fail "rekey requires recovery.rekey.confirm=true" }}
{{- end }}
{{- if and .Values.recovery.rekey.enabled .Values.recovery.rekey.confirm (not .Values.recovery.rekey.experimental) }}
{{- fail "rekey requires recovery.rekey.experimental=true — acknowledge you understand the risks" }}
{{- end }}
{{- if gt (int .Values.recovery.rekey.keyThreshold) (int .Values.recovery.rekey.keyShares) }}
{{- fail (printf "recovery.rekey.keyThreshold (%d) must be <= keyShares (%d)" (int .Values.recovery.rekey.keyThreshold) (int .Values.recovery.rekey.keyShares)) }}
{{- end }}
{{- if and .Values.recovery.rekey.syncFallback (not .Values.recovery.fallback.addr) }}
{{- fail "recovery.rekey.syncFallback=true requires recovery.fallback.addr to be set" }}
{{- end }}
{{- if and .Values.recovery.rekey.enabled .Values.recovery.rekey.confirm .Values.recovery.rekey.experimental }}
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-rekey-job
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: vault-rekey
    spec:
      serviceAccountName: vault-recovery
      containers:
      - name: vault-rekey
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["sh", "-c"]
        args:
        - |
          export VAULT_ADDR=http://vault-active:8200

          vault status -address="http://vault-active:8200" > /dev/null 2>&1
          VAULT_STATUS_EXIT=$?
          if [ $VAULT_STATUS_EXIT -eq 2 ]; then
            echo "Vault is sealed, cannot rekey"
            exit 1
          fi
          if [ $VAULT_STATUS_EXIT -ne 0 ]; then
            echo "Vault not ready for rekey (vault status exit: $VAULT_STATUS_EXIT)"
            exit 1
          fi

          VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login \
            role=vault-rekey \
            jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)")
          export VAULT_TOKEN

          {{- if .Values.recovery.encryption.enabled }}
          vault kv get -field=contents {{ include "vrf.localSecretPath" . }} \
            | openssl base64 -d \
            | openssl enc -d -aes-256-cbc -pbkdf2 -pass file:/encryption/passphrase \
            | grep -v '^$' > /tmp/current-keys.txt
          {{- else }}
          vault kv get -field=contents {{ include "vrf.localSecretPath" . }} \
            | grep -v '^$' > /tmp/current-keys.txt
          {{- end }}

          if [ ! -s /tmp/current-keys.txt ]; then
            echo "No current unseal keys found in KV (decrypt failed or keys missing)"
            exit 1
          fi

          vault operator rekey -cancel 2>/dev/null || true

          vault operator rekey -format=json \
            -init \
            -key-shares={{ .Values.recovery.rekey.keyShares }} \
            -key-threshold={{ .Values.recovery.rekey.keyThreshold }} \
            > /tmp/rekey-init.json

          NONCE=$(grep '"nonce"' /tmp/rekey-init.json | sed 's/.*"nonce": *"\([^"]*\)".*/\1/')
          rm -f /tmp/rekey-init.json

          if [ -z "$NONCE" ]; then
            echo "Rekey init failed: no nonce in response"
            exit 1
          fi

          NEW_KEYS=""
          while IFS= read -r key; do
            OUTPUT=$(vault operator rekey -format=json -nonce="$NONCE" "$key" 2>/dev/null || true)
            if echo "$OUTPUT" | grep -q '"complete": *true'; then
              NEW_KEYS=$(echo "$OUTPUT" | awk -F'"' '
                /"keys_base64"/{found=1; next}
                found && /\]/{found=0; next}
                found && length($2) > 5 {print $2}
              ')
              break
            fi
          done < /tmp/current-keys.txt

          rm -f /tmp/current-keys.txt

          if [ -z "$NEW_KEYS" ]; then
            echo "Rekey failed: insufficient key shares or parse error"
            exit 1
          fi

          {{- if .Values.recovery.encryption.enabled }}
          STORE_VALUE=$(echo "$NEW_KEYS" | \
            openssl enc -aes-256-cbc -pbkdf2 -pass file:/encryption/passphrase | \
            openssl base64 -A)
          {{- else }}
          STORE_VALUE="$NEW_KEYS"
          {{- end }}

          vault kv put {{ include "vrf.localSecretPath" . }} contents="$STORE_VALUE"
          echo "Local KV updated with new keys"

          {{- if .Values.recovery.rekey.syncFallback }}
          {{- if .Values.recovery.fallback.tlsSkipVerify }}
          export VAULT_SKIP_VERIFY=true
          {{- end }}
          export VAULT_ADDR={{ .Values.recovery.fallback.addr }}
          FALLBACK_TOKEN=$(vault write -field=token \
            {{ .Values.recovery.fallback.k8sAuthPath }}/login \
            role={{ .Values.recovery.fallback.rekeyVaultRole | default .Values.recovery.fallback.vaultRole }} \
            jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)")
          VAULT_TOKEN="$FALLBACK_TOKEN" vault kv put \
            {{ include "vrf.fallbackSecretPath" . }} contents="$STORE_VALUE"
          unset VAULT_SKIP_VERIFY
          echo "Fallback vault updated with new keys"
          {{- end }}

          echo "Rekey complete — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        {{- if .Values.recovery.encryption.enabled }}
        volumeMounts:
        - name: encryption-passphrase
          mountPath: /encryption
          readOnly: true
        {{- end }}
      restartPolicy: Never
      {{- if .Values.recovery.encryption.enabled }}
      volumes:
      - name: encryption-passphrase
        secret:
          secretName: {{ .Values.recovery.encryption.passphraseSecret }}
          items:
          - key: passphrase
            path: passphrase
      {{- end }}
  backoffLimit: 1
{{- end }}
