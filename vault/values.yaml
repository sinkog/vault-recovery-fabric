image:
  repository: "hashicorp/vault"
  tag: ""
  pullPolicy: IfNotPresent

networkPolicy:
  enabled: true
  allowClientNamespaces: []
  allowClientPodLabels: {}

bootstrap:
  storeUnsealKeys: false
  keyShares: 5
  keyThreshold: 3

recovery:
  triggerId: ""
  selfName: ""
  targets:
    - http://vault-0.vault-internal:8200
    - http://vault-1.vault-internal:8200
    - http://vault-2.vault-internal:8200
  fallback:
    addr: ""
    k8sAuthPath: "auth/kubernetes"
    vaultRole: "vault-recovery-unseal"
    secretPath: ""
    tlsSkipVerify: false
    cidr: ""
  rekey:
    enabled: false
    confirm: false
    experimental: true
    syncFallback: false
    keyShares: 5
    keyThreshold: 3
  encryption:
    enabled: false
    passphraseSecret: ""

vault:
  server:
    serviceAccount:
      createSecret: false
    initContainers:
      - name: recovery-prep
        image: hashicorp/vault:1.21.2
        imagePullPolicy: IfNotPresent
        command: [sh, /vault/scripts/recovery-init.sh]
        volumeMounts:
          - name: recovery-prep
            mountPath: /vault/recovery-prep
          - name: recovery-init-script
            mountPath: /vault/scripts
    volumes:
      - name: recovery-prep
        emptyDir:
          medium: Memory
      - name: recovery-init-script
        configMap:
          name: vault-recovery-init-script
          defaultMode: 0755
    volumeMounts:
      - name: recovery-prep
        mountPath: /vault/recovery-prep
    affinity: ""
    ha:
      enabled: true
      raft:
        enabled: true
    postStart:
    - sh
    - -c
    - |
      if [ -s /vault/recovery-prep/vault-token ]; then
        echo "Recovery token available — fetching unseal keys from fallback Vault"
        FALLBACK_ADDR=$(cat /vault/recovery-prep/fallback-addr)
        SECRET_PATH=$(cat /vault/recovery-prep/secret-path)
        export VAULT_ADDR=$FALLBACK_ADDR
        export VAULT_TOKEN=$(cat /vault/recovery-prep/vault-token)
        rm -f /vault/recovery-prep/vault-token \
              /vault/recovery-prep/fallback-addr \
              /vault/recovery-prep/secret-path

        if [ -f /vault/recovery-prep/encrypted ]; then
          UNSEAL_KEYS=$(vault kv get -field=contents "$SECRET_PATH" \
            | openssl base64 -d \
            | openssl enc -d -aes-256-cbc -pbkdf2 -pass file:/vault/recovery-passphrase/passphrase \
            | grep -v '^$')
          rm -f /vault/recovery-prep/encrypted
        else
          UNSEAL_KEYS=$(vault kv get -field=contents "$SECRET_PATH" | grep -v '^$')
        fi

        unset VAULT_TOKEN VAULT_ADDR
        echo "$UNSEAL_KEYS" | while IFS= read -r key; do
          printf '{"key":"%s"}' "$key" | \
            curl -sf --request PUT --data @- \
              http://localhost:8200/v1/sys/unseal > /dev/null
        done
        unset UNSEAL_KEYS
      elif [[ "$HOSTNAME" != "vault-0" ]] || nc -z vault-active 8200; then
        while ! nc -z vault-active 8200; do sleep 1; done
        export VAULT_ADDR=http://vault-active:8200
        until curl -sf -o /dev/null -w "%{http_code}" \
            http://vault-active:8200/v1/sys/health 2>/dev/null | \
            grep -qE '^(200|429|503)$'; do sleep 2; done
        export VAULT_ADDR=http://localhost:8200
        while ! vault operator raft join http://vault-active:8200; do sleep 3; done
        export VAULT_ADDR=http://vault-active:8200
        while ! VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login \
            role=vault-unseal \
            jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"); do sleep 4; done
        export VAULT_TOKEN
        UNSEAL_KEYS=$(vault kv get -field=contents secret/vault/unseal-keys 2>/dev/null || true)
        if [ -n "$UNSEAL_KEYS" ]; then
          echo "$UNSEAL_KEYS" | grep -v '^$' | while IFS= read -r key; do
            printf '{"key":"%s"}' "$key" | \
              curl -sf --request PUT --data @- \
                http://localhost:8200/v1/sys/unseal > /dev/null
          done
        else
          echo "No local unseal keys found — manual or mesh recovery required"
        fi
      fi