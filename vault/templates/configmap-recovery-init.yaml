apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-recovery-init-script
data:
  recovery-init.sh: |
    #!/bin/sh
    # Recovery preparation initContainer.
    # Fetches a short-lived, single-use token from the fallback Vault and
    # writes it (plus connection metadata) to Memory emptyDir for postStart.
    # The main container uses this token to fetch unseal keys directly from
    # the fallback Vault — unseal keys never touch the emptyDir.

    {{- if .Values.recovery.fallback.addr }}
    PREP_DIR=/vault/recovery-prep
    FALLBACK_API={{ .Values.recovery.fallback.addr }}

    # If vault-active is already unsealed, no recovery needed
    ACTIVE_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
      http://vault-active:8200/v1/sys/health 2>/dev/null || echo "000")

    if [ "$ACTIVE_CODE" = "200" ] || [ "$ACTIVE_CODE" = "429" ]; then
      echo "vault-active reachable and unsealed — no recovery prep needed"
      exit 0
    fi

    # No unsealed active node — try any reachable Vault that can provide a token.
    # Try the configured fallback Vault first, then any other target that responds.
    {{- if .Values.recovery.fallback.tlsSkipVerify }}
    export VAULT_SKIP_VERIFY=true
    {{- end }}

    VAULT_TOKEN=""
    ACTIVE_FALLBACK=""

    for CANDIDATE in "$FALLBACK_API" {{ join " " .Values.recovery.targets }}; do
      CAND_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
        "${CANDIDATE}/v1/sys/health" 2>/dev/null || echo "000")
      if echo "$CAND_CODE" | grep -qE '^(200|429)$'; then
        export VAULT_ADDR=$CANDIDATE
        TOK=$(vault write -field=token \
          {{ .Values.recovery.fallback.k8sAuthPath }}/login \
          role={{ .Values.recovery.fallback.vaultRole }} \
          jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" 2>/dev/null)
        if [ -n "$TOK" ]; then
          VAULT_TOKEN="$TOK"
          ACTIVE_FALLBACK="$CANDIDATE"
          echo "Token obtained from: ${CANDIDATE}"
          break
        fi
      fi
    done

    if [ -z "$VAULT_TOKEN" ]; then
      echo "No reachable Vault found to obtain recovery token"
      exit 0
    fi
    export VAULT_ADDR=$ACTIVE_FALLBACK

    # Write token and connection info to Memory emptyDir.
    # The main container (postStart) will use these to fetch unseal keys directly.
    # Unseal keys never touch this directory.
    echo "$VAULT_TOKEN"      > ${PREP_DIR}/vault-token
    echo "$ACTIVE_FALLBACK"  > ${PREP_DIR}/fallback-addr
    echo "{{ include "vrf.fallbackSecretPath" . }}" > ${PREP_DIR}/secret-path
    {{- if .Values.recovery.encryption.enabled }}
    echo "true"           > ${PREP_DIR}/encrypted
    {{- end }}

    unset VAULT_TOKEN VAULT_SKIP_VERIFY
    echo "Recovery token prepared in ${PREP_DIR} (single-use, TTL-limited)"
    {{- else }}
    echo "No recovery.fallback.addr configured; skipping recovery-prep"
    exit 0
    {{- end }}
