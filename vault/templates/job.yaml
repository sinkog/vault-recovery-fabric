{{- if .Values.bootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-wait-job
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "5"
spec:
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: vault-wait
    spec:
      serviceAccountName: vault-recovery
      containers:
      - name: vault-wait-container
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["sh", "-c"]
        args:
        - |
          VAULT_API=http://vault-0.vault-internal:8200

          echo "[1/9] Waiting for Vault API at ${VAULT_API}..."
          until vault status -address="${VAULT_API}" > /dev/null 2>&1 || \
                vault status -address="${VAULT_API}" 2>&1 | grep -q "Initialized"; do
            sleep 1
          done
          echo "[1/9] Vault API reachable."

          if vault status -address="${VAULT_API}" 2>&1 | grep -q "Initialized.*true"; then
            echo "[1/9] Vault already initialized, skipping init"
            exit 0
          fi

          echo "[2/9] Initializing Vault (keyShares={{ .Values.bootstrap.keyShares }}, keyThreshold={{ .Values.bootstrap.keyThreshold }})..."
          export VAULT_ADDR=$VAULT_API
          vault operator init \
            -key-shares={{ .Values.bootstrap.keyShares }} \
            -key-threshold={{ .Values.bootstrap.keyThreshold }} \
            -format=json > /tmp/init.json
          awk '/unseal_keys_b64/{f=1;next} f&&/\]/{f=0} f{gsub(/[" ,]/,"");if(length>0)print}' /tmp/init.json > /tmp/vault-unseal.txt
          awk -F'"' '/root_token/{print $4}' /tmp/init.json > /tmp/vault-token.txt
          echo "[2/9] Init done. Keys: $(wc -l < /tmp/vault-unseal.txt)"

          echo "[3/9] Unsealing vault-0..."
          while IFS= read -r key; do
            printf '{"key":"%s"}' "$key" | \
              wget -q --post-file=- \
                --header="Content-Type: application/json" \
                -O /dev/null \
                "${VAULT_API}/v1/sys/unseal"
          done < /tmp/vault-unseal.txt
          echo "[3/9] Unseal done. Status: $(vault status -address="${VAULT_API}" 2>&1 | grep Sealed)"

          export VAULT_TOKEN=$(cat /tmp/vault-token.txt)
          export VAULT_ADDR=http://vault-active:8200

          echo "[4/9] Enabling secrets engine (KV v2)..."
          vault secrets enable -path=secret -version=2 kv 2>&1 || echo "[4/9] Already enabled or error"

          echo "[5/9] Enabling kubernetes auth..."
          vault auth enable kubernetes 2>&1 || echo "[5/9] Already enabled or error"

          echo "[5/9] Waiting for vault-reviewer-token..."
          until [ -s /var/run/secrets/vault-reviewer/token ]; do
            echo "[5/9] Token not ready, waiting..."
            sleep 2
          done
          echo "[5/9] Reviewer token ready."

          echo "[6/9] Configuring kubernetes auth..."
          vault write auth/kubernetes/config \
            token_reviewer_jwt="$(cat /var/run/secrets/vault-reviewer/token)" \
            kubernetes_host=https://${KUBERNETES_PORT_443_TCP_ADDR}:443 \
            kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
            disable_iss_validation=true && \
          echo "[6/9] K8s auth configured." || echo "[6/9] ERROR: K8s auth config failed!"

          echo "[7/9] Writing policies..."
          ls /mnt/config/* | xargs basename | sed 's/\..*$//' | while read -r line; do
            vault policy write $line /mnt/config/$line.hcl && echo "[7/9] Policy '$line' written."
          done

          echo "[8/9] Creating K8s auth roles..."
          vault write auth/kubernetes/role/vault-unseal \
            bound_service_account_names=vault \
            bound_service_account_namespaces={{ .Release.Namespace }} \
            policies=vault-unseal \
            ttl=1h && echo "[8/9] Role vault-unseal OK"
          vault write auth/kubernetes/role/vault-recovery-unseal \
            bound_service_account_names=vault-recovery \
            bound_service_account_namespaces={{ .Release.Namespace }} \
            policies=vault-unseal \
            ttl=5m \
            token_num_uses=2 && echo "[8/9] Role vault-recovery-unseal OK"
          vault write auth/kubernetes/role/vault-rekey \
            bound_service_account_names=vault-recovery \
            bound_service_account_namespaces={{ .Release.Namespace }} \
            policies=vault-rekey \
            ttl=15m \
            token_num_uses=20 && echo "[8/9] Role vault-rekey OK"

          {{- if .Values.bootstrap.storeUnsealKeys }}
          echo "[9/9] Storing unseal keys in KV..."
          vault kv put {{ include "vrf.localSecretPath" . }} contents=@/tmp/vault-unseal.txt && \
          echo "[9/9] Keys stored at {{ include "vrf.localSecretPath" . }}" || echo "[9/9] ERROR: KV store failed!"
          {{- else }}
          echo "[9/9] storeUnsealKeys=false, skipping KV store."
          {{- end }}
          echo "=== VAULT BOOTSTRAP COMPLETE ==="
          echo "Root token: $(cat /tmp/vault-token.txt)"
          echo "Unseal keys:"; cat /tmp/vault-unseal.txt
          echo "==========================="
          sleep 3600
          rm -f /tmp/init.json /tmp/vault-unseal.txt /tmp/vault-token.txt
        volumeMounts:
        - name: config-volume
          mountPath: /mnt/config
        - name: vault-reviewer-token
          mountPath: /var/run/secrets/vault-reviewer
          readOnly: true
      restartPolicy: Never
      volumes:
      - name: config-volume
        configMap:
          name: vault-postconfig
      - name: vault-reviewer-token
        secret:
          secretName: vault-reviewer-token
  backoffLimit: 4

{{- end }}
