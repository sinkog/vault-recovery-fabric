apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-poststart-script
data:
  poststart.sh: |
    #!/bin/sh
    # Unseal script — used by both postStart (pod) and recovery-job main container.
    #
    # Environment variables:
    #   UNSEAL_TARGETS  space-separated list of Vault API addresses to unseal
    #                   default: http://localhost:8200 (pod postStart mode)
    #   SKIP_RAFT_JOIN  true = skip raft join (recovery-job mode)
    #                   default: false (pod postStart mode does raft join)
    #   PREP_DIR        directory with vault-url, vault-token, secret-path files
    #                   default: /vault/recovery-prep

    PREP_DIR="${PREP_DIR:-/vault/recovery-prep}"
    TARGETS="${UNSEAL_TARGETS:-http://localhost:8200}"
    SKIP_RAFT="${SKIP_RAFT_JOIN:-false}"

    VAULT_URL=$(cat ${PREP_DIR}/vault-url 2>/dev/null || echo "none")

    if [ "$VAULT_URL" = "none" ] || [ -z "$VAULT_URL" ]; then
      echo "No vault URL from initContainer — staying sealed"
      exit 0
    fi

    HEALTH=$(curl -s -o /dev/null -w "%{http_code}" \
      "${VAULT_URL}/v1/sys/health" 2>/dev/null || echo "000")
    if [ "$HEALTH" != "200" ] && [ "$HEALTH" != "429" ]; then
      echo "Vault at ${VAULT_URL} no longer reachable (HTTP ${HEALTH}) — staying sealed"
      exit 0
    fi

    SECRET_PATH=$(cat ${PREP_DIR}/secret-path)
    export VAULT_ADDR=$VAULT_URL
    export VAULT_TOKEN=$(cat ${PREP_DIR}/vault-token)
    rm -f ${PREP_DIR}/vault-url \
          ${PREP_DIR}/vault-token \
          ${PREP_DIR}/secret-path

    if [ -f ${PREP_DIR}/encrypted ]; then
      UNSEAL_KEYS=$(vault kv get -field=contents "$SECRET_PATH" \
        | openssl base64 -d \
        | openssl enc -d -aes-256-cbc -pbkdf2 -pass file:/vault/recovery-passphrase/passphrase \
        | grep -v '^$' 2>/dev/null)
      rm -f ${PREP_DIR}/encrypted
    else
      UNSEAL_KEYS=$(vault kv get -field=contents "$SECRET_PATH" 2>/dev/null | grep -v '^$')
    fi
    unset VAULT_TOKEN VAULT_ADDR

    if [ -z "$UNSEAL_KEYS" ]; then
      echo "No unseal keys retrieved — staying sealed"
      exit 0
    fi

    UNSEALED_COUNT=0

    for TARGET_API in $TARGETS; do
      export VAULT_ADDR=http://localhost:8200

      if [ "$SKIP_RAFT" != "true" ] && [ "$TARGET_API" = "http://localhost:8200" ] && \
         [[ "$HOSTNAME" != "vault-0" ]]; then
        RAFT_TRIES=0
        until vault operator raft join http://vault-active:8200 || [ $RAFT_TRIES -ge 20 ]; do
          RAFT_TRIES=$((RAFT_TRIES + 1))
          sleep 3
        done
        if [ $RAFT_TRIES -ge 20 ]; then
          echo "raft join failed after 20 attempts — staying sealed"
          exit 0
        fi
      fi

      HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
        "${TARGET_API}/v1/sys/health" 2>/dev/null || echo "000")

      if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "429" ]; then
        echo "${TARGET_API}: already unsealed, skipping"
        UNSEALED_COUNT=$((UNSEALED_COUNT + 1))
        continue
      fi

      if [ "$HTTP_CODE" = "501" ]; then
        echo "${TARGET_API}: uninitialized — skipping"
        continue
      fi

      if [ "$HTTP_CODE" = "000" ]; then
        echo "${TARGET_API}: unreachable — skipping"
        continue
      fi

      echo "$UNSEAL_KEYS" | while IFS= read -r key; do
        printf '{"key":"%s"}' "$key" | \
          curl -sf --request PUT --data @- \
            "${TARGET_API}/v1/sys/unseal" > /dev/null
      done

      FINAL=$(curl -s -o /dev/null -w "%{http_code}" \
        "${TARGET_API}/v1/sys/health" 2>/dev/null || echo "000")
      if [ "$FINAL" = "200" ] || [ "$FINAL" = "429" ] || [ "$FINAL" = "473" ]; then
        echo "${TARGET_API}: unsealed (HTTP ${FINAL})"
        UNSEALED_COUNT=$((UNSEALED_COUNT + 1))
      else
        echo "${TARGET_API}: unseal may have failed (HTTP ${FINAL})"
      fi
    done

    unset UNSEAL_KEYS

    if [ "$UNSEALED_COUNT" -eq 0 ]; then
      echo "No targets successfully unsealed"
      exit 1
    fi
    echo "Done — ${UNSEALED_COUNT} target(s) unsealed"
