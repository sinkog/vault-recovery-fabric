{{- if ne .Release.Name "vault" }}
{{- fail (printf "vault-recovery-fabric requires Helm release name 'vault' (got: '%s'). Service names vault-active and vault-0.vault-internal are hardcoded for release name 'vault'." .Release.Name) }}
{{- end }}
{{- if gt (int .Values.bootstrap.keyThreshold) (int .Values.bootstrap.keyShares) }}
{{- fail (printf "bootstrap.keyThreshold (%d) must be <= bootstrap.keyShares (%d)" (int .Values.bootstrap.keyThreshold) (int .Values.bootstrap.keyShares)) }}
{{- end }}
{{- if and .Values.recovery.selfName .Values.bootstrap.storeUnsealKeys }}
{{- fail "bootstrap.storeUnsealKeys=true is only supported in legacy/lab mode without recovery.selfName. In mesh mode, set bootstrap.storeUnsealKeys=false and use the recovery Job for unsealing." }}
{{- end }}
{{- $localPath := trimPrefix "secret/" (include "vrf.localSecretPath" .) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-postconfig
data:
  vault-unseal.hcl: |
    # KV v2: policy uses secret/data/<path> prefix (not secret/<path>)
    path "secret/data/{{ $localPath }}" {
        capabilities = ["read"]
    }
    path "secret/metadata/{{ $localPath }}" {
        capabilities = ["read"]
    }
    # Required for Vault CLI preflight mount detection
    path "secret/" {
        capabilities = ["read"]
    }
  vault-rekey.hcl: |
    path "secret/data/{{ $localPath }}" {
        capabilities = ["read", "create", "update"]
    }
    path "secret/metadata/{{ $localPath }}" {
        capabilities = ["read", "list"]
    }
    path "sys/rekey/*" {
        capabilities = ["create", "update", "read", "delete"]
    }
    path "sys/rekey/init" {
        capabilities = ["create", "update", "read", "delete"]
    }
