bootstrap:
  keyShares: 1
  keyThreshold: 1
  holdInitMaterialSeconds: 3600
  store:
    k8sSecret:
      enabled: true
      name: "vault-init-material"

networkPolicy:
  enabled: false

recovery:
  manualJob:
    triggerId: ""
    keyThreshold: 1
  rekey:
    enabled: false
    confirm: false
    syncFallback: false
    experimental: true
    keyShares: 1
    keyThreshold: 1
  encryption:
    enabled: false
    passphraseSecret: ""
    autoGeneratePassphrase: true

vault:
  server:
    affinity: ""
    ha:
      enabled: true
      raft:
        enabled: true
