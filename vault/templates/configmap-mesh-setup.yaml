{{- if .Values.recovery.selfName }}
{{- $fbPath := include "vrf.fallbackSecretPath" . }}
{{- $fbDataPath := trimPrefix "secret/" $fbPath }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-mesh-setup
data:
  README: |
    Cross-cluster recovery mesh setup
    ===================================
    Terminology:
      SOURCE cluster  = THIS cluster ({{ .Values.recovery.selfName }}) — the one being recovered
      FALLBACK cluster = the cluster that holds recovery material for the source

    Run these steps on the FALLBACK Vault cluster to allow this source cluster's
    recovery job to authenticate and read its unseal keys.

    1. Enable a SOURCE-CLUSTER-SPECIFIC Kubernetes auth mount on the FALLBACK Vault:

       IMPORTANT: Do NOT use the shared "auth/kubernetes" mount on the fallback Vault.
       Each source cluster needs its own auth path to avoid overwriting the
       fallback Vault's own Kubernetes auth configuration.

       # On the FALLBACK cluster:
       vault auth enable -path={{ .Values.recovery.fallback.k8sAuthPath }} kubernetes

    2. Configure the source-cluster Kubernetes auth on the FALLBACK Vault:

       # token_reviewer_jwt: a service account token from the FALLBACK cluster
       # kubernetes_host:    the SOURCE cluster's Kubernetes API endpoint
       # kubernetes_ca_cert: the SOURCE cluster's CA certificate
       vault write {{ .Values.recovery.fallback.k8sAuthPath }}/config \
         token_reviewer_jwt="<FALLBACK-cluster-sa-token>" \
         kubernetes_host="<SOURCE-cluster-k8s-api>" \
         kubernetes_ca_cert="<SOURCE-cluster-ca-cert>"

    3. Create a policy on the fallback Vault for this cluster's recovery material:

       NOTE: KV v2 policy path requires secret/data/<path> prefix (not secret/<path>).
       The CLI uses secret/<path>, but policies must reference the API path.

       vault policy write {{ .Values.recovery.selfName }}-recovery - <<EOF
       path "secret/data/{{ $fbDataPath }}" {
         capabilities = ["read"]
       }
       path "secret/metadata/{{ $fbDataPath }}" {
         capabilities = ["read"]
       }
       EOF

    4. Create a Kubernetes auth role on the fallback Vault (read-only recovery):

       vault write {{ .Values.recovery.fallback.k8sAuthPath }}/role/{{ .Values.recovery.fallback.vaultRole }} \
         bound_service_account_names=vault-recovery \
         bound_service_account_namespaces={{ .Release.Namespace }} \
         policies={{ .Values.recovery.selfName }}-recovery \
         ttl=5m \
         token_num_uses=2

    4b. [OPTIONAL — only if rekey.syncFallback=true] Create a write-capable role and policy:

       vault policy write {{ .Values.recovery.selfName }}-recovery-rekey - <<EOF
       path "secret/data/{{ $fbDataPath }}" {
         capabilities = ["create", "update", "read"]
       }
       path "secret/metadata/{{ $fbDataPath }}" {
         capabilities = ["read", "list"]
       }
       EOF

       vault write {{ .Values.recovery.fallback.k8sAuthPath }}/role/{{ .Values.recovery.fallback.rekeyVaultRole | default "vault-recovery-rekey-sync" }} \
         bound_service_account_names=vault-recovery \
         bound_service_account_namespaces={{ .Release.Namespace }} \
         policies={{ .Values.recovery.selfName }}-recovery-rekey \
         ttl=5m \
         token_num_uses=2

    5a. [LAB ONLY] Store raw unseal keys on the fallback Vault:

       WARNING: raw key storage is for local testing only.
       Do not use in production — use the encrypted flow below.

       vault kv put {{ $fbPath }} \
         contents=@/tmp/vault-unseal.txt

    5b. [PRODUCTION] Store encrypted recovery material on the fallback Vault:

       # Create passphrase on THIS cluster
       kubectl create secret generic vault-recovery-passphrase \
         -n {{ .Release.Namespace }} \
         --from-literal=passphrase="$(openssl rand -base64 32)"

       # Read passphrase from THIS cluster
       PASSPHRASE=$(kubectl get secret vault-recovery-passphrase \
         -n {{ .Release.Namespace }} -o jsonpath='{.data.passphrase}' | base64 -d)

       # Source: secure out-of-band bootstrap custody.
       # The unseal keys were printed by vault operator init — store them securely
       # and reference them here. Do NOT read from local KV in production.
       LOCAL_KEYS=$(cat /secure/bootstrap/{{ .Values.recovery.selfName | default "<this-vault>" }}-unseal-keys.txt)
       # Lab-only alternative (local KV, requires vault-active to be unsealed):
       # LOCAL_KEYS=$(vault kv get -field=contents secret/vault/unseal-keys)

       # Encrypt and write to FALLBACK Vault
       # Write passphrase to temp file to avoid shell argument exposure
       echo "$PASSPHRASE" > /tmp/passphrase.tmp
       ENCRYPTED=$(echo "$LOCAL_KEYS" \
         | openssl enc -aes-256-cbc -pbkdf2 -pass file:/tmp/passphrase.tmp | openssl base64 -A)
       rm -f /tmp/passphrase.tmp
       VAULT_ADDR={{ .Values.recovery.fallback.addr | default "<FALLBACK-VAULT-ADDR>" }} \
         vault kv put {{ $fbPath }} contents="$ENCRYPTED"

    6. Trigger recovery:

       helm upgrade vault ./vault -n {{ .Release.Namespace }} \
         --reuse-values \
         --set-string recovery.manualJob.triggerId=$(date +%Y%m%d%H%M%S) \
         --set recovery.fallback.addr={{ .Values.recovery.fallback.addr | default "<FALLBACK-VAULT-ADDR>" }} \
         --set recovery.fallback.cidr={{ .Values.recovery.fallback.cidr | default "<FALLBACK-VAULT-CIDR>" }}

    7. Reset after recovery:

       helm upgrade vault ./vault -n {{ .Release.Namespace }} \
         --reuse-values \
         --set recovery.manualJob.triggerId=""
{{- end }}
