bootstrap:
  storeUnsealKeys: false

networkPolicy:
  enabled: true

recovery:
  triggerId: ""
  selfName: ""
  fallback:
    addr: ""
    k8sAuthPath: "auth/kubernetes"
    vaultRole: "vault-recovery-unseal"
    secretPath: "secret/vault/unseal-keys"
    tlsSkipVerify: false
    cidr: ""  # Required in production: set to fallback Vault CIDR to restrict NetworkPolicy egress
  rekey:
    enabled: false
    confirm: false
    syncFallback: false
    experimental: true
    keyShares: 5
    keyThreshold: 3
  encryption:
    enabled: true
    passphraseSecret: "vault-recovery-passphrase"

vault:
  server:
    serviceAccount:
      createSecret: false
    ha:
      enabled: true
      raft:
        enabled: true
    affinity: |
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: vault
              component: server
          topologyKey: kubernetes.io/hostname
