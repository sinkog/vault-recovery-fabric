{{- if .Values.vault.server.serviceAccount.createSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-auth-secret
  annotations:
    kubernetes.io/service-account.name: vault-auth
type: kubernetes.io/service-account-token
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-recovery-token
  annotations:
    kubernetes.io/service-account.name: vault-recovery
type: kubernetes.io/service-account-token
