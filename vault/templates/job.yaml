apiVersion: batch/v1
kind: Job
metadata:
  name: vault-wait-job
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "5"
spec:
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: vault-wait
    spec:
      serviceAccountName: vault-recovery
      containers:
      - name: vault-wait-container
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["sh", "-c"]
        args:
        - |
          VAULT_API=http://vault-0.vault-internal:8200

          # Wait for Vault API to respond (any HTTP status means API is up)
          until curl -s -o /dev/null -w "%{http_code}" \
              "${VAULT_API}/v1/sys/health" 2>/dev/null | \
              grep -qE '^[2345][0-9][0-9]$'; do
            sleep 1
          done

          # 501 = not initialized; anything else = already initialized
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${VAULT_API}/v1/sys/health" 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" != "501" ]; then
            echo "Vault already initialized (HTTP $HTTP_CODE), skipping init"
            exit 0
          fi

          export VAULT_ADDR=$VAULT_API
          vault operator init > /tmp/keys.txt
          grep Unseal /tmp/keys.txt | awk '{ print $4 }' > /tmp/vault-unseal.txt
          grep Token  /tmp/keys.txt | awk '{ print $4 }' > /tmp/vault-token.txt

          while IFS= read -r key; do
            printf '{"key":"%s"}' "$key" | \
              curl -sf --request PUT --data @- \
                "${VAULT_API}/v1/sys/unseal" > /dev/null
          done < /tmp/vault-unseal.txt

          export VAULT_TOKEN=$(cat /tmp/vault-token.txt)
          export VAULT_ADDR=http://vault-active:8200

          vault secrets list | grep -q '^kv/' || vault secrets enable -version=2 kv
          vault auth list   | grep -q '^kubernetes/' || vault auth enable kubernetes
          vault write auth/kubernetes/config \
            token_reviewer_jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
            kubernetes_host=https://${KUBERNETES_PORT_443_TCP_ADDR}:443 \
            kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          vault write auth/kubernetes/role/vault-unseal \
            bound_service_account_names=vault \
            bound_service_account_namespaces={{ .Release.Namespace }} \
            policies=vault-unseal \
            ttl=1h
          vault write auth/kubernetes/role/vault-recovery-unseal \
            bound_service_account_names=vault-recovery \
            bound_service_account_namespaces={{ .Release.Namespace }} \
            policies=vault-unseal \
            ttl=5m \
            token_num_uses=2
          vault write auth/kubernetes/role/vault-rekey \
            bound_service_account_names=vault-recovery \
            bound_service_account_namespaces={{ .Release.Namespace }} \
            policies=vault-rekey \
            ttl=10m \
            token_num_uses=3
          vault secrets list | grep -q '^secret/' || vault secrets enable -path=secret -version=2 kv
          {{- if .Values.bootstrap.storeUnsealKeys }}
          vault kv put secret/vault/unseal-keys contents=@/tmp/vault-unseal.txt
          {{- end }}
          ls /mnt/config/* | xargs basename | sed 's/\..*$//' | while read -r line; do
            vault policy write $line /mnt/config/$line.hcl
          done
        volumeMounts:
        - name: config-volume
          mountPath: /mnt/config
      restartPolicy: Never
      volumes:
      - name: config-volume
        configMap:
          name: vault-postconfig
  backoffLimit: 4
