apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-poststart-script
data:
  poststart.sh: |
    #!/bin/sh
    # Unseal script — used by both postStart (pod) and recovery-job main container.
    #
    # Environment variables:
    #   UNSEAL_TARGETS  space-separated list of Vault API addresses to unseal
    #                   default: http://localhost:8200 (pod postStart mode)
    #   SKIP_RAFT_JOIN  true = skip raft join (recovery-job mode)
    #                   default: false
    #   PREP_DIR        directory with vault-url, vault-token, secret-path files
    #                   default: /vault/recovery-prep

    PREP_DIR="${PREP_DIR:-/vault/recovery-prep}"
    TARGETS="${UNSEAL_TARGETS:-http://localhost:8200}"
    SKIP_RAFT="${SKIP_RAFT_JOIN:-false}"

    # vault_unsealed <addr> — returns 0 if vault is active/standby (unsealed)
    vault_unsealed() {
      vault status -address="$1" > /dev/null 2>&1
    }

    echo "[poststart] HOSTNAME=${HOSTNAME} PREP_DIR=${PREP_DIR}"

    VAULT_URL=$(cat ${PREP_DIR}/vault-url 2>/dev/null || echo "none")
    echo "[poststart] vault-url: ${VAULT_URL}"

    if [ "$VAULT_URL" = "none" ] || [ -z "$VAULT_URL" ]; then
      echo "[poststart] No vault URL from initContainer — staying sealed"
      exit 0
    fi

    if ! vault_unsealed "$VAULT_URL"; then
      echo "[poststart] Vault at ${VAULT_URL} no longer reachable/unsealed — staying sealed"
      exit 0
    fi

    SECRET_PATH=$(cat ${PREP_DIR}/secret-path)
    echo "[poststart] secret-path: ${SECRET_PATH}"
    VAULT_TOKEN=$(cat ${PREP_DIR}/vault-token)
    rm -f ${PREP_DIR}/vault-url \
          ${PREP_DIR}/vault-token \
          ${PREP_DIR}/secret-path

    echo "[poststart] fetching unseal keys from ${VAULT_URL} at ${SECRET_PATH}..."
    if [ -f ${PREP_DIR}/encrypted ]; then
      UNSEAL_KEYS=$(VAULT_TOKEN="$VAULT_TOKEN" VAULT_ADDR="$VAULT_URL" \
        vault kv get -field=contents "$SECRET_PATH" \
        | openssl base64 -d \
        | openssl enc -d -aes-256-cbc -pbkdf2 -pass file:/vault/recovery-passphrase/passphrase \
        | grep -v '^$' 2>/dev/null)
      rm -f ${PREP_DIR}/encrypted
    else
      UNSEAL_KEYS=$(VAULT_TOKEN="$VAULT_TOKEN" VAULT_ADDR="$VAULT_URL" \
        vault kv get -field=contents "$SECRET_PATH" 2>/dev/null | grep -v '^$')
    fi
    unset VAULT_TOKEN

    if [ -z "$UNSEAL_KEYS" ]; then
      echo "[poststart] No unseal keys retrieved — staying sealed"
      exit 0
    fi
    echo "[poststart] unseal keys retrieved ($(echo "$UNSEAL_KEYS" | wc -l) keys)"

    UNSEALED_COUNT=0

    for TARGET_API in $TARGETS; do
      export VAULT_ADDR=http://localhost:8200
      echo "[poststart] processing target: ${TARGET_API}"

      if [ "$SKIP_RAFT" != "true" ] && [ "$TARGET_API" = "http://localhost:8200" ] && \
         [ "$HOSTNAME" != "vault-0" ]; then
        echo "[poststart] waiting for vault-active TCP..."
        while ! nc -z vault-active 8200; do sleep 1; done
        echo "[poststart] attempting raft join..."
        if ! vault operator raft join http://vault-active:8200; then
          echo "[poststart] raft join failed — staying sealed"
          exit 0
        fi
        echo "[poststart] raft join succeeded"
      fi

      vault status -address="$TARGET_API" > /dev/null 2>&1
      STATUS_EXIT=$?
      echo "[poststart] vault status exit code: ${STATUS_EXIT}"
      if [ $STATUS_EXIT -eq 0 ]; then
        echo "[poststart] ${TARGET_API}: already unsealed, skipping"
        UNSEALED_COUNT=$((UNSEALED_COUNT + 1))
        continue
      fi

      # exit 1 = uninitialized or unreachable
      if [ $STATUS_EXIT -eq 1 ]; then
        vault status -address="$TARGET_API" 2>&1 | grep -q "not initialized" && \
          echo "[poststart] ${TARGET_API}: uninitialized — skipping" && continue
        echo "[poststart] ${TARGET_API}: unreachable — skipping"
        continue
      fi

      # exit 2 = sealed — send unseal keys
      echo "[poststart] ${TARGET_API}: sealed, sending unseal keys"
      echo "$UNSEAL_KEYS" | while IFS= read -r key; do
        printf '{"key":"%s"}' "$key" | \
          wget -q -O /dev/null \
            --post-file=- \
            --header="Content-Type: application/json" \
            "${TARGET_API}/v1/sys/unseal"
      done

      UNSEAL_CHECK=0
      until vault status -address="$TARGET_API" > /dev/null 2>&1 || [ $UNSEAL_CHECK -ge 10 ]; do
        UNSEAL_CHECK=$((UNSEAL_CHECK + 1))
        sleep 1
      done
      if vault status -address="$TARGET_API" > /dev/null 2>&1; then
        echo "[poststart] ${TARGET_API}: unsealed successfully"
        UNSEALED_COUNT=$((UNSEALED_COUNT + 1))
      else
        echo "[poststart] ${TARGET_API}: unseal keys sent, status still sealed after 10s"
      fi
    done

    unset UNSEAL_KEYS

    if [ "$UNSEALED_COUNT" -eq 0 ]; then
      echo "[poststart] No targets unsealed (keys sent, vault may still be unsealing)"
    fi
    echo "Done — ${UNSEALED_COUNT} target(s) unsealed"
