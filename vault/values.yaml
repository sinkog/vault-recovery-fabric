image:
  repository: "hashicorp/vault"
  tag: ""
  pullPolicy: IfNotPresent


networkPolicy:
  enabled: true
  allowClientNamespaces: []
  allowClientPodLabels: {}

bootstrap:
  enabled: true
  storeUnsealKeys: true
  keyShares: 5
  keyThreshold: 3

recovery:
  selfName: ""
  fallback:
    addr: ""
    k8sAuthPath: "auth/kubernetes"
    vaultRole: "vault-recovery-unseal"
    secretPath: ""
    tlsSkipVerify: false
    cidr: ""

  # manualJob: operátori fan-out recovery eszköz.
  # Csak akkor futtatható, ha a fallback Vault már elérhető
  # (az első Vault kézi feloldása után).
  # Trigger: helm upgrade --set-string recovery.manualJob.triggerId=$(date +%Y%m%d%H%M%S)
  manualJob:
    triggerId: ""
    targets:
      - http://vault-0.vault-internal:8200
      - http://vault-1.vault-internal:8200
      - http://vault-2.vault-internal:8200
    keyThreshold: 3

  # podUnseal: pod lifecycle assisted-unseal via recovery-prep initContainer + postStart.
  # Enabled when extraInitContainers are defined (values-mesh.yaml / values-production.yaml).
  # No separate flag — disable by removing extraInitContainers from your values overlay.

  rekey:
    enabled: false
    confirm: false
    experimental: true
    syncFallback: false
    keyShares: 5
    keyThreshold: 3
  encryption:
    enabled: false
    passphraseSecret: "vault-recovery-passphrase"
    autoGeneratePassphrase: false

vault:
  server:
    serviceAccount:
      createSecret: false
    image:
      repository: "hashicorp/vault"
      tag: "1.21.2"
      pullPolicy: IfNotPresent
    # NOTE: image tag is hardcoded here because values.yaml is not a Helm template.
    # When upgrading Vault, update both vault.server.image.tag AND this image field.
    extraInitContainers:
      - name: recovery-prep
        image: hashicorp/vault:1.21.2
        imagePullPolicy: IfNotPresent
        command: [sh, /vault/scripts/recovery-init.sh]
        volumeMounts:
          - name: recovery-prep
            mountPath: /vault/recovery-prep
          - name: recovery-init-script
            mountPath: /vault/scripts
          - name: vault-recovery-token
            mountPath: /var/run/secrets/vault-recovery
            readOnly: true
    volumes:
      - name: recovery-prep
        emptyDir:
          medium: Memory
      - name: recovery-init-script
        configMap:
          name: vault-recovery-init-script
          defaultMode: 0755
      - name: vault-poststart-script
        configMap:
          name: vault-poststart-script
          defaultMode: 0755
      - name: vault-recovery-token
        secret:
          secretName: vault-recovery-token
    volumeMounts:
      - name: recovery-prep
        mountPath: /vault/recovery-prep
      - name: vault-poststart-script
        mountPath: /vault/scripts/poststart
        readOnly: true
    affinity: ""
    ha:
      enabled: true
      raft:
        enabled: true
    postStart:
    - sh
    - /vault/scripts/poststart/poststart.sh