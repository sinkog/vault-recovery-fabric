{{- if .Values.recovery.manualJob.triggerId }}
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-recovery-{{ .Values.recovery.manualJob.triggerId | lower | replace "_" "-" | replace "." "-" | trunc 47 | trimSuffix "-" }}
  annotations:
    "helm.sh/hook": post-upgrade,post-install
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "10"
spec:
  ttlSecondsAfterFinished: 300
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: vault-recovery
    spec:
      serviceAccountName: vault-recovery
      initContainers:
      - name: recovery-auth
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["sh", "-c"]
        args:
        - |
          FALLBACK_API={{ .Values.recovery.fallback.addr }}
          {{- if .Values.recovery.fallback.tlsSkipVerify }}
          export VAULT_SKIP_VERIFY=true
          {{- end }}
          export VAULT_ADDR=$FALLBACK_API

          # Loop until a valid token is obtained
          until [ -s /recovery/vault-token ]; do
            FB_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "${FALLBACK_API}/v1/sys/health" 2>/dev/null || echo "000")

            if echo "$FB_CODE" | grep -qE '^(200|429)$'; then
              VAULT_TOKEN=$(vault write -field=token \
                {{ .Values.recovery.fallback.k8sAuthPath }}/login \
                role={{ .Values.recovery.fallback.vaultRole }} \
                jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" 2>/dev/null)

              if [ -n "$VAULT_TOKEN" ]; then
                echo "$VAULT_TOKEN" > /recovery/vault-token
                unset VAULT_TOKEN
                break
              fi
              echo "Token request failed, retrying in 5s..."
            else
              echo "Fallback vault not ready (HTTP ${FB_CODE}), retrying in 5s..."
            fi
            sleep 5
          done
        volumeMounts:
        - name: recovery-data
          mountPath: /recovery
      containers:
      - name: recovery-unseal
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["sh", "-c"]
        args:
        - |
          export VAULT_ADDR={{ .Values.recovery.fallback.addr }}
          {{- if .Values.recovery.fallback.tlsSkipVerify }}
          export VAULT_SKIP_VERIFY=true
          {{- end }}
          export VAULT_TOKEN=$(cat /recovery/vault-token)

          {{- if .Values.recovery.encryption.enabled }}
          vault kv get -field=contents {{ include "vrf.fallbackSecretPath" . }} \
            | openssl base64 -d \
            | openssl enc -d -aes-256-cbc -pbkdf2 -pass file:/encryption/passphrase \
            | grep -v '^$' > /recovery/unseal-keys
          {{- else }}
          vault kv get -field=contents {{ include "vrf.fallbackSecretPath" . }} \
            | grep -v '^$' > /recovery/unseal-keys
          {{- end }}

          rm -f /recovery/vault-token

          KEY_COUNT=$(grep -c . /recovery/unseal-keys 2>/dev/null || echo 0)
          if [ "$KEY_COUNT" -lt {{ .Values.recovery.manualJob.keyThreshold }} ]; then
            echo "Recovery material has $KEY_COUNT key(s), need at least {{ .Values.recovery.manualJob.keyThreshold }} (threshold). Aborting."
            rm -f /recovery/unseal-keys
            exit 1
          fi
          echo "Recovery material: $KEY_COUNT key(s) available"

          TARGETS="{{ join " " .Values.recovery.manualJob.targets }}"
          UNSEALED_COUNT=0

          for TARGET_API in $TARGETS; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "${TARGET_API}/v1/sys/health" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "429" ]; then
              echo "${TARGET_API}: already unsealed (HTTP ${HTTP_CODE}), skipping"
              UNSEALED_COUNT=$((UNSEALED_COUNT + 1))
              continue
            fi

            if [ "$HTTP_CODE" = "000" ]; then
              echo "${TARGET_API}: unreachable, skipping"
              continue
            fi

            if [ "$HTTP_CODE" = "501" ]; then
              echo "${TARGET_API}: uninitialized (HTTP 501) — refusing to unseal, skipping"
              continue
            fi

            echo "${TARGET_API}: sealed (HTTP ${HTTP_CODE}), sending unseal keys"
            while IFS= read -r key; do
              printf '{"key":"%s"}' "$key" | \
                curl -sf --request PUT --data @- \
                  "${TARGET_API}/v1/sys/unseal" > /dev/null
            done < /recovery/unseal-keys

            FINAL_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "${TARGET_API}/v1/sys/health" 2>/dev/null || echo "000")
            if [ "$FINAL_CODE" = "200" ] || [ "$FINAL_CODE" = "429" ]; then
              echo "${TARGET_API}: recovery complete (HTTP ${FINAL_CODE})"
              UNSEALED_COUNT=$((UNSEALED_COUNT + 1))
            else
              echo "${TARGET_API}: recovery failed (HTTP ${FINAL_CODE})"
            fi
          done

          rm -f /recovery/unseal-keys

          if [ "$UNSEALED_COUNT" -eq 0 ]; then
            echo "Recovery failed — no targets successfully unsealed"
            exit 1
          fi
          echo "Recovery complete — ${UNSEALED_COUNT} target(s) unsealed"
        volumeMounts:
        - name: recovery-data
          mountPath: /recovery
        {{- if .Values.recovery.encryption.enabled }}
        - name: encryption-passphrase
          mountPath: /encryption
          readOnly: true
        {{- end }}
      restartPolicy: OnFailure
      volumes:
      - name: recovery-data
        emptyDir:
          medium: Memory
      {{- if .Values.recovery.encryption.enabled }}
      - name: encryption-passphrase
        secret:
          secretName: {{ .Values.recovery.encryption.passphraseSecret }}
          items:
          - key: passphrase
            path: passphrase
      {{- end }}
  backoffLimit: 3
{{- end }}
