apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: {{ .Values.spec.project }}
  namespace: argocd
spec:
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  destinations:
  - namespace: {{ .Values.spec.destination.namespace }}
    server: {{ .Values.spec.destination.server }}
  orphanedResources:
    warn: false
  sourceRepos:
  - '*'
