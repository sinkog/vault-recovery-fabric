{{- if .Values.recovery.encryption.enabled }}
{{- $secretName := .Values.recovery.encryption.passphraseSecret }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    vault-recovery-fabric/auto-generated: "true"
    vault-recovery-fabric/note: "Auto-generated passphrase. Back this up — losing it makes recovery material unrecoverable."
type: Opaque
data:
  passphrase: {{ randAlphaNum 32 | b64enc }}
{{- end }}
{{- end }}
