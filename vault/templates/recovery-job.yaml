{{- if .Values.recovery.triggerId }}
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-recovery-{{ .Values.recovery.triggerId | lower | replace "_" "-" | replace "." "-" | trunc 47 | trimSuffix "-" }}
  annotations:
    "helm.sh/hook": post-upgrade,post-install
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "10"
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: vault-recovery
    spec:
      serviceAccountName: vault-recovery
      initContainers:
      - name: recovery-auth
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["sh", "-c"]
        args:
        - |
          FALLBACK_API={{ .Values.recovery.fallback.addr }}
          {{- if .Values.recovery.fallback.tlsSkipVerify }}
          export VAULT_SKIP_VERIFY=true
          {{- end }}

          # Wait for fallback Vault API to respond (any HTTP status = reachable)
          until curl -s -o /dev/null -w "%{http_code}" \
              "${FALLBACK_API}/v1/sys/health" 2>/dev/null | \
              grep -qE '^[2345][0-9][0-9]$'; do
            sleep 2
          done

          export VAULT_ADDR=$FALLBACK_API
          VAULT_TOKEN=$(vault write -field=token \
            {{ .Values.recovery.fallback.k8sAuthPath }}/login \
            role={{ .Values.recovery.fallback.vaultRole }} \
            jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)")
          echo "$VAULT_TOKEN" > /recovery/vault-token
        volumeMounts:
        - name: recovery-data
          mountPath: /recovery
      containers:
      - name: recovery-unseal
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["sh", "-c"]
        args:
        - |
          export VAULT_ADDR={{ .Values.recovery.fallback.addr }}
          {{- if .Values.recovery.fallback.tlsSkipVerify }}
          export VAULT_SKIP_VERIFY=true
          {{- end }}
          export VAULT_TOKEN=$(cat /recovery/vault-token)

          {{- if .Values.recovery.encryption.enabled }}
          PASSPHRASE=$(cat /encryption/passphrase)
          vault kv get -field=contents {{ .Values.recovery.fallback.secretPath }} \
            | openssl base64 -d \
            | openssl enc -d -aes-256-cbc -pbkdf2 -pass "pass:$PASSPHRASE" \
            | grep -v '^$' > /recovery/unseal-keys
          {{- else }}
          vault kv get -field=contents {{ .Values.recovery.fallback.secretPath }} \
            | grep -v '^$' > /recovery/unseal-keys
          {{- end }}

          rm -f /recovery/vault-token

          TARGET_API=http://vault-active:8200

          # Wait for target Vault API to respond — sealed (503) is expected and OK
          until curl -s -o /dev/null -w "%{http_code}" \
              "${TARGET_API}/v1/sys/health" 2>/dev/null | \
              grep -qE '^[2345][0-9][0-9]$'; do
            sleep 2
          done

          # 200/429 = already unsealed; 503 = sealed (proceed)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${TARGET_API}/v1/sys/health" 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "429" ]; then
            echo "Vault already unsealed (HTTP $HTTP_CODE)"
            rm -f /recovery/unseal-keys
            exit 0
          fi

          while IFS= read -r key; do
            printf '{"key":"%s"}' "$key" | \
              curl -sf --request PUT --data @- \
                "${TARGET_API}/v1/sys/unseal" > /dev/null
          done < /recovery/unseal-keys
          rm -f /recovery/unseal-keys
          echo "Recovery complete"
        volumeMounts:
        - name: recovery-data
          mountPath: /recovery
        {{- if .Values.recovery.encryption.enabled }}
        - name: encryption-passphrase
          mountPath: /encryption
          readOnly: true
        {{- end }}
      restartPolicy: OnFailure
      volumes:
      - name: recovery-data
        emptyDir:
          medium: Memory
      {{- if .Values.recovery.encryption.enabled }}
      - name: encryption-passphrase
        secret:
          secretName: {{ .Values.recovery.encryption.passphraseSecret }}
          items:
          - key: passphrase
            path: passphrase
      {{- end }}
  backoffLimit: 3
{{- end }}
