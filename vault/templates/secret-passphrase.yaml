{{- if and .Values.recovery.encryption.enabled .Values.recovery.encryption.autoGeneratePassphrase }}
{{- $secretName := .Values.recovery.encryption.passphraseSecret }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    vault-recovery-fabric/auto-generated: "true"
    vault-recovery-fabric/note: "Auto-generated passphrase (lab/dev only). NOT suitable for production. Back this up or switch to autoGeneratePassphrase=false with a manually managed Secret."
type: Opaque
data:
  passphrase: {{ randAlphaNum 32 | b64enc }}
{{- end }}
{{- end }}
{{- if and .Values.recovery.encryption.enabled (not .Values.recovery.encryption.autoGeneratePassphrase) }}
# autoGeneratePassphrase=false: Secret must be created before install:
#   kubectl create secret generic {{ .Values.recovery.encryption.passphraseSecret }} \
#     -n {{ .Release.Namespace }} \
#     --from-literal=passphrase="$(openssl rand -base64 32)"
# If the Secret is missing, Vault pods will fail to start (volume mount error).
{{- end }}
