bootstrap:
  storeUnsealKeys: true
  keyShares: 1
  keyThreshold: 1

networkPolicy:
  enabled: false

recovery:
  manualJob:
    triggerId: ""
    keyThreshold: 1
  rekey:
    enabled: false
    confirm: false
    syncFallback: false
    experimental: true
    keyShares: 1
    keyThreshold: 1
  encryption:
    enabled: false
    passphraseSecret: ""
    autoGeneratePassphrase: true

vault:
  server:
    affinity: ""
    ha:
      enabled: true
      raft:
        enabled: true
