bootstrap:
  holdInitMaterialSeconds: 0
  store:
    k8sSecret:
      enabled: false

networkPolicy:
  enabled: true

recovery:
  manualJob:
    triggerId: ""
  selfName: ""
  fallback:
    addr: ""
    k8sAuthPath: "auth/kubernetes"
    vaultRole: "vault-recovery-unseal"
    secretPath: ""
    tlsSkipVerify: false
    cidr: ""  # Required in production: set to fallback Vault CIDR to restrict NetworkPolicy egress
  rekey:
    enabled: false
    confirm: false
    syncFallback: false
    experimental: true
    keyShares: 5
    keyThreshold: 3
  encryption:
    enabled: true
    passphraseSecret: "vault-recovery-passphrase"

vault:
  server:
    serviceAccount:
      createSecret: false
    image:
      repository: "hashicorp/vault"
      tag: "1.21.2"
    volumes:
      - name: recovery-prep
        emptyDir:
          medium: Memory
      - name: recovery-init-script
        configMap:
          name: vault-recovery-init-script
          defaultMode: 0755
      - name: vault-poststart-script
        configMap:
          name: vault-poststart-script
          defaultMode: 0755
      - name: vault-recovery-passphrase
        secret:
          secretName: vault-recovery-passphrase
          items:
            - key: passphrase
              path: passphrase
      - name: vault-recovery-token
        secret:
          secretName: vault-recovery-token
    volumeMounts:
      - name: recovery-prep
        mountPath: /vault/recovery-prep
      - name: vault-poststart-script
        mountPath: /vault/scripts/poststart
        readOnly: true
      - name: vault-recovery-passphrase
        mountPath: /vault/recovery-passphrase
        readOnly: true
    ha:
      enabled: true
      raft:
        enabled: true
    affinity: |
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: vault
              component: server
          topologyKey: kubernetes.io/hostname
