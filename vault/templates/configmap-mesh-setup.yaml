{{- if .Values.recovery.selfName }}
{{- $fbPath := include "vrf.fallbackSecretPath" . }}
{{- $fbDataPath := trimPrefix "secret/" $fbPath }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-mesh-setup
data:
  README: |
    Cross-cluster recovery mesh setup
    ===================================
    Run these steps on the FALLBACK Vault cluster to allow this cluster's
    recovery job to authenticate and read unseal keys.

    1. Configure Kubernetes auth for this cluster on the fallback Vault:

       vault write auth/kubernetes/config \
         token_reviewer_jwt="<fallback-vault-sa-token>" \
         kubernetes_host="<THIS-cluster-k8s-api>" \
         kubernetes_ca_cert="<THIS-cluster-ca-cert>"

    2. Create a policy on the fallback Vault for this cluster's recovery material:

       NOTE: KV v2 policy path requires secret/data/<path> prefix (not secret/<path>).
       The CLI uses secret/<path>, but policies must reference the API path.

       vault policy write {{ .Values.recovery.selfName }}-recovery - <<EOF
       path "secret/data/{{ $fbDataPath }}" {
         capabilities = ["read"]
       }
       path "secret/metadata/{{ $fbDataPath }}" {
         capabilities = ["read"]
       }
       EOF

    3. Create a Kubernetes auth role on the fallback Vault:

       vault write auth/kubernetes/role/{{ .Values.recovery.fallback.vaultRole }} \
         bound_service_account_names=vault-recovery,vault \
         bound_service_account_namespaces={{ .Release.Namespace }} \
         policies={{ .Values.recovery.selfName }}-recovery \
         ttl=5m \
         token_num_uses=2
       NOTE: bound_service_account_names includes both 'vault-recovery' (recovery Job)
             and 'vault' (pod-level postStart via initContainer recovery-prep)

    4a. [LAB ONLY] Store raw unseal keys on the fallback Vault:

       WARNING: raw key storage is for local testing only.
       Do not use in production — use the encrypted flow below.

       vault kv put {{ $fbPath }} \
         contents=@/tmp/vault-unseal.txt

    4b. [PRODUCTION] Store encrypted recovery material on the fallback Vault:

       # Create passphrase on THIS cluster
       kubectl create secret generic vault-recovery-passphrase \
         -n {{ .Release.Namespace }} \
         --from-literal=passphrase="$(openssl rand -base64 32)"

       # Read passphrase from THIS cluster
       PASSPHRASE=$(kubectl get secret vault-recovery-passphrase \
         -n {{ .Release.Namespace }} -o jsonpath='{.data.passphrase}' | base64 -d)

       # Source: secure out-of-band bootstrap custody.
       # The unseal keys were printed by vault operator init — store them securely
       # and reference them here. Do NOT read from local KV in production.
       LOCAL_KEYS=$(cat /secure/bootstrap/{{ .Values.recovery.selfName | default "<this-vault>" }}-unseal-keys.txt)
       # Lab-only alternative (requires bootstrap.storeUnsealKeys=true):
       # LOCAL_KEYS=$(vault kv get -field=contents secret/vault/unseal-keys)

       # Encrypt and write to FALLBACK Vault
       # Write passphrase to temp file to avoid shell argument exposure
       echo "$PASSPHRASE" > /tmp/passphrase.tmp
       ENCRYPTED=$(echo "$LOCAL_KEYS" \
         | openssl enc -aes-256-cbc -pbkdf2 -pass file:/tmp/passphrase.tmp | openssl base64 -A)
       rm -f /tmp/passphrase.tmp
       VAULT_ADDR={{ .Values.recovery.fallback.addr | default "<FALLBACK-VAULT-ADDR>" }} \
         vault kv put {{ $fbPath }} contents="$ENCRYPTED"

    5. Trigger recovery:

       helm upgrade vault ./vault -n {{ .Release.Namespace }} \
         --set recovery.triggerId=$(date +%Y%m%d%H%M%S) \
         --set recovery.fallback.addr={{ .Values.recovery.fallback.addr | default "<FALLBACK-VAULT-ADDR>" }} \
         --set recovery.fallback.cidr={{ .Values.recovery.fallback.cidr | default "<FALLBACK-VAULT-CIDR>" }}

    6. Reset after recovery:

       helm upgrade vault ./vault -n {{ .Release.Namespace }} \
         --set recovery.triggerId=""
{{- end }}
